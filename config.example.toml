# rust-dns configuration. Copy to config.toml (or pass a path as argv[1]).
# If config.toml is missing, the server writes these defaults on first run.

[dns]
# DNS listen address (UDP + TCP). Port 53 needs root / a capability (see README).
bind = "0.0.0.0:53"
# SO_REUSEPORT sockets / receive loops. 0 = one per CPU core.
workers = 0
# How blocked domains are answered: "zero_ip" (return 0.0.0.0 / ::) or "nxdomain".
sinkhole_mode = "zero_ip"
sinkhole_ipv4 = "0.0.0.0"
sinkhole_ipv6 = "::"
sinkhole_ttl = 60

[upstream]
# Plain UDP/TCP resolvers, tried in order. Edit live from the web UI.
servers = ["1.1.1.1:53", "8.8.8.8:53"]
timeout_ms = 2000
# Burst guard: max simultaneous in-flight queries to upstream.
max_concurrent = 256
# Hard ceiling on queries-per-second to upstream.
max_qps = 2000

[cache]
# In-RAM entry cap (bounds memory well under 1 GB; ~150 MB at 500k).
max_entries = 500000
# Embedded redb store used for durability + warm restarts.
db_path = "cache.redb"
# Write-behind flush interval (ms). Lower loses fewer entries on a hard crash.
flush_ms = 500
# How often (seconds) to delete expired rows from the store.
purge_interval_secs = 300
min_ttl = 30
max_ttl = 86400
negative_ttl = 60

[qlog]
# Query logging to columnar Parquet, queried on demand with DataFusion.
enabled = true
dir = "logs"
# Hard cap for the log directory; oldest segments are deleted past this.
max_bytes = 2147483648   # 2 GB
# Flush a segment at least this often, or once flush_rows have buffered.
flush_secs = 5
flush_rows = 10000
# Record client IPs (set false for privacy).
log_client_ip = true
# Per-query memory ceiling for DataFusion (MB).
mem_limit_mb = 128

[web]
bind = "0.0.0.0:8080"
# CHANGE THIS. Sent as `Authorization: Bearer <token>`. Empty = no auth.
admin_token = "change-me"
blocklist_path = "blocklist.txt"
