name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-gnu

jobs:
  release:
    name: Build & publish (Ubuntu / x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo & target
        uses: Swatinem/rust-cache@v2

      - name: Gate on checks (fmt, clippy, tests)
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --release --locked

      - name: Build release
        run: cargo build --release --locked --target "$TARGET"

      - name: Package
        id: pkg
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          NAME="rust-dns-${TAG}-${TARGET}"
          mkdir -p "dist/${NAME}"
          cp "target/${TARGET}/release/rust-dns" "dist/${NAME}/"
          strip "dist/${NAME}/rust-dns" || true
          cp config.example.toml README.md CHANGELOG.md LICENSE "dist/${NAME}/"
          cp deploy/rust-dns.service "dist/${NAME}/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )
          echo "archive=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
